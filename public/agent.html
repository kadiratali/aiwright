<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aiwright — QA Agent</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #0f1115; --panel: #181b22; --line: #2a2f3a; --fg: #e6e8eb;
      --muted: #9aa3b2; --accent: #6ea8fe; --ok: #3fb950; --warn: #d29922; --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--fg);
      background:
        radial-gradient(820px 360px at 50% -140px, rgba(110,168,254,0.16), transparent 70%),
        radial-gradient(620px 300px at 88% -60px, rgba(45,212,191,0.10), transparent 70%),
        var(--bg);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
    /* brand header */
    .brand { display: flex; align-items: center; gap: 14px; margin: 6px 0 26px; }
    .brand .logo { flex: none; filter: drop-shadow(0 6px 16px rgba(110,168,254,.32)); }
    .brand-name { font-size: 21px; font-weight: 700; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 10px; }
    .brand-chip { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em;
      color: var(--accent); border: 1px solid rgba(110,168,254,.35); border-radius: 20px;
      padding: 2px 9px; background: rgba(110,168,254,.08); }
    .brand-tag { color: var(--muted); font-size: 13.5px; margin-top: 3px; max-width: 660px; }
    .brand-tag a { color: var(--accent); text-decoration: none; }
    .brand-tag a:hover { text-decoration: underline; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; }
    .sub a { color: var(--accent); text-decoration: none; }
    .panel { background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 0 0 14px; }
    textarea { width: 100%; min-height: 130px; background: #0c0e12; color: var(--fg);
      border: 1px solid var(--line); border-radius: 8px; padding: 12px; resize: vertical;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { background: var(--accent); color: #0b1020; border: 0; border-radius: 8px;
      padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.ghost { background: transparent; color: var(--fg); border: 1px solid var(--line); }
    button.bad { background: var(--bad); color: #fff; }
    button.warn { background: var(--warn); color: #0b1020; }
    .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    .hidden { display: none; }
    #log { font: 12.5px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0c0e12; border: 1px solid var(--line); border-radius: 8px;
      padding: 14px; max-height: 460px; overflow-y: auto; white-space: pre-wrap; }
    .ev { margin: 2px 0; }
    .ev .tag { color: var(--muted); }
    .plan { color: var(--accent); }
    .ok { color: var(--ok); } .bad { color: var(--bad); } .muted { color: var(--muted); }
    .gate { border: 1px solid var(--accent); }
    .gate.esc { border-color: var(--bad); }
    .gate h2 { color: var(--fg); }
    .gate .reason { color: var(--muted); margin: 0 0 12px; }
    .pill { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 20px;
      border: 1px solid var(--line); color: var(--muted); margin-left: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="brand">
      <svg class="logo" width="46" height="46" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="aiwright">
        <defs>
          <linearGradient id="awg" x1="4" y1="4" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6ea8fe"/><stop offset="1" stop-color="#2dd4bf"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="36" height="36" rx="11" fill="url(#awg)"/>
        <path d="M13 22.5l5.2 5.2L27 17.5" stroke="#091018" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30.5 12.2l.95 2.45 2.45.95-2.45.95-.95 2.45-.95-2.45-2.45-.95 2.45-.95z" fill="#091018"/>
      </svg>
      <div>
        <div class="brand-name">aiwright <span class="brand-chip">QA Agent</span></div>
        <div class="brand-tag">Give it a story; it plans and runs the pipeline itself — pausing for your OK
          on side-effecting steps and stopping on a real regression. ·
          <a href="/index.html">Step-by-step studio →</a></div>
      </div>
    </header>

    <div class="panel" id="startPanel">
      <h2>User story</h2>
      <textarea id="story" placeholder="As a registered customer I want to log in so that..."></textarea>
      <div class="row">
        <button id="startBtn">Start agent</button>
        <span class="muted" id="status"></span>
      </div>
    </div>

    <div class="panel gate hidden" id="gate">
      <h2 id="gateTitle">Decision needed</h2>
      <p class="reason" id="gateReason"></p>
      <div class="row" id="gateButtons"></div>
    </div>

    <div class="panel hidden" id="runPanel">
      <h2>Run</h2>
      <div id="log"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const startBtn = $('startBtn'), storyEl = $('story'), statusEl = $('status');
    const logEl = $('log'), runPanel = $('runPanel');
    const gate = $('gate'), gateTitle = $('gateTitle'), gateReason = $('gateReason'), gateButtons = $('gateButtons');
    let runId = null;

    function line(html, cls) {
      const div = document.createElement('div');
      div.className = 'ev' + (cls ? ' ' + cls : '');
      div.innerHTML = html;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

    function showGate(kind, reason, options) {
      gate.classList.remove('hidden');
      gate.classList.toggle('esc', kind === 'escalate');
      gateTitle.textContent = kind === 'escalate' ? '⚠ Escalation — real regression?' : 'Approve this step?';
      gateReason.textContent = reason;
      gateButtons.innerHTML = '';
      for (const opt of options) {
        const b = document.createElement('button');
        b.textContent = opt.label;
        if (opt.cls) b.className = opt.cls;
        b.onclick = () => decide(opt.value);
        gateButtons.appendChild(b);
      }
    }
    function hideGate() { gate.classList.add('hidden'); }

    async function decide(value) {
      hideGate();
      await fetch(`/api/agent/${runId}/decision`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      });
    }

    function onEvent(e) {
      switch (e.type) {
        case 'start':
          line(`<span class="tag">goal:</span> ${esc(e.goal)}`, 'muted'); break;
        case 'plan':
          line(`🧠 ${esc(e.text)}`, 'plan'); break;
        case 'tool':
          line(`▶ <b>${e.tool}</b> <span class="pill">${e.decision}</span> <span class="muted">${esc(e.reason)}</span>`
            + (e.input && Object.keys(e.input).length ? ` <span class="muted">${esc(JSON.stringify(e.input))}</span>` : '')); break;
        case 'awaiting-approval':
          showGate('approve', `"${e.tool}" — ${e.reason}`, [
            { label: 'Approve', value: 'yes' },
            { label: 'Decline', value: 'no', cls: 'ghost' },
            { label: 'Abort run', value: 'abort', cls: 'bad' }
          ]); break;
        case 'declined':
          line(`  ✗ declined "${e.tool}"`, 'muted'); break;
        case 'result':
          line(`  ${e.ok ? '✓' : '✗'} ${esc(e.summary)}`, e.ok ? 'ok' : 'bad'); break;
        case 'error':
          line(`  ✗ error (${e.tool}): ${esc(e.message)}`, 'bad'); break;
        case 'escalation':
          line(`⚠ ESCALATION: ${esc(e.reason)}`, 'bad');
          showGate('escalate', e.reason, [
            { label: 'Halt for triage', value: 'halt', cls: 'bad' },
            { label: 'Continue anyway', value: 'continue', cls: 'warn' }
          ]); break;
        case 'done':
          hideGate();
          line(`■ done — ${e.outcome}${e.statePath ? ' · ' + esc(e.statePath) : ''}`,
            e.outcome === 'completed' ? 'ok' : 'bad');
          statusEl.textContent = `Finished: ${e.outcome}`;
          startBtn.disabled = false;
          break;
      }
    }

    startBtn.onclick = async () => {
      const story = storyEl.value.trim();
      if (!story) { statusEl.textContent = 'Enter a story first.'; return; }
      startBtn.disabled = true;
      statusEl.textContent = 'Starting…';
      logEl.innerHTML = '';
      runPanel.classList.remove('hidden');
      try {
        const r = await fetch('/api/agent/start', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ story })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'failed to start');
        runId = data.runId;
        statusEl.textContent = 'Running…';
        const src = new EventSource(`/api/agent/${runId}/events`);
        src.onmessage = (m) => onEvent(JSON.parse(m.data));
        src.onerror = () => src.close();
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        startBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
