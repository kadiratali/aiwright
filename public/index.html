<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aiwright — AI QA Studio</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #181b22; --line: #2a2f3a; --fg: #e6e8eb;
      --muted: #9aa3b2; --accent: #6ea8fe; --ok: #3fb950; --warn: #d29922; --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 28px; }
    .panel { background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 0 0 14px; }
    textarea { width: 100%; min-height: 150px; background: #0c0e12; color: var(--fg);
      border: 1px solid var(--line); border-radius: 8px; padding: 12px; resize: vertical;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { background: var(--accent); color: #0b1020; border: 0; border-radius: 8px;
      padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--line); }
    .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    .hidden { display: none; }
    .understanding { color: var(--muted); border-left: 3px solid var(--accent);
      padding: 4px 0 4px 12px; margin: 0 0 18px; }
    .risk { font-size: 13px; color: var(--muted); margin: 4px 0; }
    .sev { display: inline-block; width: 64px; }
    .sev.high { color: var(--bad); } .sev.medium { color: var(--warn); } .sev.low { color: var(--ok); }
    .scn { display: flex; gap: 10px; padding: 12px; border: 1px solid var(--line);
      border-radius: 8px; margin-bottom: 10px; background: #0c0e12; }
    .scn input { margin-top: 4px; width: 16px; height: 16px; accent-color: var(--accent); }
    .scn .title { font-weight: 600; }
    .badge { font-size: 11px; padding: 1px 7px; border-radius: 20px; border: 1px solid var(--line);
      color: var(--muted); margin-left: 6px; }
    .badge.P0 { color: var(--bad); border-color: var(--bad); }
    .badge.P1 { color: var(--warn); border-color: var(--warn); }
    .rationale { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .q { color: var(--muted); font-size: 13px; margin: 4px 0; }
    pre { background: #0c0e12; border: 1px solid var(--line); border-radius: 8px;
      padding: 14px; overflow: auto; font: 12.5px/1.5 ui-monospace, Menlo, monospace;
      margin: 6px 0 18px; }
    .file-h { font-size: 13px; color: var(--accent); margin: 0 0 4px; font-weight: 600; }
    .err { color: var(--bad); font-size: 13px; margin-top: 10px; }
    .spin { color: var(--muted); font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
    .spinner { width: 14px; height: 14px; flex: none; border: 2px solid var(--line);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { color: var(--muted); font-size: 12px; opacity: .8; }
    .saved { color: var(--ok); font-size: 13px; margin-top: 12px; white-space: pre-line; }
    .verify-ok { color: var(--ok); font-size: 13px; margin-top: 12px; font-weight: 600; }
    .verify-bad { color: var(--bad); font-size: 13px; margin-top: 12px; font-weight: 600; }
    .verify-bad .e { color: var(--muted); font-weight: 400; font-family: ui-monospace, Menlo, monospace;
      font-size: 12px; margin: 3px 0 0 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>aiwright — AI QA Studio</h1>
    <p class="sub">Paste a user story → review &amp; pick the scenarios → generate the test code.</p>

    <div class="panel">
      <h2>1 · User story</h2>
      <textarea id="story" placeholder="As a logged-in customer I want to ...&#10;&#10;Acceptance Criteria:&#10;1. ..."></textarea>
      <div class="row">
        <button id="analyzeBtn">Analyze</button>
        <span id="analyzeStatus" class="spin"></span>
      </div>
      <div id="analyzeErr" class="err"></div>
    </div>

    <div id="designPanel" class="panel hidden">
      <h2>2 · What to test — pick scenarios</h2>
      <div id="designTitle" style="font-weight:600;margin-bottom:6px;"></div>
      <p id="understanding" class="understanding"></p>
      <div id="risks"></div>
      <div id="scenarios" style="margin-top:16px;"></div>
      <div id="questions" style="margin-top:14px;"></div>
      <div class="row">
        <button id="generateBtn">Generate selected</button>
        <span id="genStatus" class="spin"></span>
      </div>
      <div id="genErr" class="err"></div>
    </div>

    <div id="outPanel" class="panel hidden">
      <h2>3 · Generated code</h2>
      <div id="artifacts"></div>
      <div class="row">
        <button id="saveBtn" class="ghost">Save to project</button>
        <span id="saveStatus" class="spin"></span>
      </div>
      <div id="saved" class="saved"></div>
      <div id="verifyResult"></div>
      <div class="row" id="fixRow" style="display:none;">
        <button id="fixBtn" class="ghost">Auto-fix wiring</button>
        <span id="fixStatus" class="spin"></span>
      </div>
      <div id="saveErr" class="err"></div>
    </div>
  </div>

  <script>
    let currentDesign = null;
    let currentArtifacts = null;

    const $ = (id) => document.getElementById(id);
    const esc = (s) => s.replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

    async function postJSON(url, body) {
      const r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
      return data;
    }

    // Shows a spinner + live elapsed-seconds counter so long calls never look frozen.
    // Returns a stop() function.
    function startBusy(el, label, btn) {
      const t0 = Date.now();
      const oldBtnText = btn ? btn.textContent : null;
      if (btn) { btn.disabled = true; btn.textContent = 'Working…'; }
      const tick = () => {
        const s = Math.floor((Date.now() - t0) / 1000);
        el.innerHTML = `<span class="spinner"></span><span>${label} (${s}s)</span>`;
      };
      tick();
      const id = setInterval(tick, 1000);
      return () => {
        clearInterval(id);
        el.innerHTML = '';
        if (btn) { btn.disabled = false; btn.textContent = oldBtnText; }
      };
    }

    $('analyzeBtn').onclick = async () => {
      const story = $('story').value.trim();
      $('analyzeErr').textContent = '';
      if (!story) { $('analyzeErr').textContent = 'Enter a user story first.'; return; }
      const stop = startBusy($('analyzeStatus'), 'Analyzing the story…', $('analyzeBtn'));
      try {
        currentDesign = await postJSON('/api/design', { story });
        renderDesign(currentDesign);
        $('designPanel').classList.remove('hidden');
        $('designPanel').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        $('analyzeErr').textContent = e.message;
      } finally {
        stop();
      }
    };

    function renderDesign(d) {
      $('designTitle').textContent = d.title;
      $('understanding').textContent = d.understanding;
      $('risks').innerHTML = (d.riskAreas || []).map((r) =>
        `<div class="risk"><span class="sev ${r.severity}">${r.severity}</span> <b>${esc(r.area)}</b> — ${esc(r.reason)}</div>`
      ).join('');
      $('scenarios').innerHTML = (d.scenarios || []).map((s, i) =>
        `<label class="scn">
           <input type="checkbox" data-i="${i}" checked />
           <div>
             <div class="title">${esc(s.title)}
               <span class="badge ${s.priority}">${s.priority}</span>
               <span class="badge">${esc(s.type)}</span>
             </div>
             <div class="rationale">${esc(s.rationale)}</div>
           </div>
         </label>`
      ).join('');
      const qs = d.openQuestions || [];
      $('questions').innerHTML = qs.length
        ? '<div style="color:var(--muted);font-size:13px;margin-bottom:6px;">Open questions (clarify before relying on the tests):</div>'
          + qs.map((q) => `<div class="q">• ${esc(q)}</div>`).join('')
        : '';
    }

    $('generateBtn').onclick = async () => {
      const selected = [...document.querySelectorAll('#scenarios input:checked')].map((c) => +c.dataset.i);
      $('genErr').textContent = '';
      if (selected.length === 0) { $('genErr').textContent = 'Pick at least one scenario.'; return; }
      const stop = startBusy($('genStatus'), 'Generating test code — this can take 10–30s…', $('generateBtn'));
      try {
        currentArtifacts = await postJSON('/api/generate', {
          story: $('story').value.trim(), design: currentDesign, selected
        });
        renderArtifacts(currentArtifacts);
        $('outPanel').classList.remove('hidden');
        $('saved').textContent = ''; $('saveErr').textContent = '';
        $('outPanel').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        $('genErr').textContent = e.message;
      } finally {
        stop();
      }
    };

    function renderArtifacts(a) {
      let html =
        `<div class="file-h">${esc(a.featureFileName)}</div><pre>${esc(a.featureContent)}</pre>` +
        `<div class="file-h">${esc(a.stepsFileName)}</div><pre>${esc(a.stepsContent)}</pre>`;
      for (const po of a.pageObjects || [])
        html += `<div class="file-h">${esc(po.fileName)}</div><pre>${esc(po.content)}</pre>`;
      if (a.notes) html += `<div class="file-h">Notes</div><pre>${esc(a.notes)}</pre>`;
      $('artifacts').innerHTML = html;
    }

    function renderVerify(verify) {
      const el = $('verifyResult');
      if (!verify) { el.innerHTML = ''; $('fixRow').style.display = 'none'; return; }
      if (verify.ok) {
        el.className = 'verify-ok';
        el.textContent = '✓ Generated code type-checks — ready to run.';
        $('fixRow').style.display = 'none';
      } else {
        el.className = 'verify-bad';
        const lines = verify.errors.map((e) =>
          `<div class="e">${esc((e.file.split('/').pop()) + ':' + e.line + '  ' + e.message)}</div>`).join('');
        el.innerHTML = `✗ ${verify.errors.length} type error(s) — wiring needed:` + lines;
        $('fixRow').style.display = 'flex';
      }
    }

    $('saveBtn').onclick = async () => {
      $('saveErr').textContent = ''; $('saved').textContent = ''; renderVerify(null);
      const stop = startBusy($('saveStatus'), 'Saving & type-checking…', $('saveBtn'));
      try {
        const { written, verify } = await postJSON('/api/save', { artifacts: currentArtifacts });
        $('saved').textContent = 'Saved:\n' + written.join('\n');
        renderVerify(verify);
      } catch (e) {
        $('saveErr').textContent = e.message;
      } finally {
        stop();
      }
    };

    $('fixBtn').onclick = async () => {
      $('saveErr').textContent = '';
      const stop = startBusy($('fixStatus'), 'Self-correcting until it compiles…', $('fixBtn'));
      try {
        const data = await postJSON('/api/fix', { story: $('story').value.trim(), artifacts: currentArtifacts });
        currentArtifacts = data.artifacts;
        renderArtifacts(currentArtifacts);
        renderVerify(data.verify);
        $('saved').textContent = (data.rounds ? `Fixed in ${data.rounds} round(s). ` : '') + 'Updated:\n' + data.written.join('\n');
      } catch (e) {
        $('saveErr').textContent = e.message;
      } finally {
        stop();
      }
    };
  </script>
</body>
</html>
