# Self-hosted Practice Software Testing ("Toolshop") app for CI E2E.
# Uses the official prebuilt images (no source build). The Angular UI runs in dev mode,
# so it talks to the LOCAL API (http://localhost:8091) — no public site, no Cloudflare.
# Derived from the project's docker-compose.prod.yml (SPRINT pinned to sprint5).
services:
  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: toolshop
    ports:
      - 3306:3306

  laravel-api:
    image: testsmith/practice-software-testing-sprint5-api
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
      - DB_PORT=3306
      - DB_HOST=mariadb
      - host=localhost
      - DISABLE_LOGGING=true
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      - mariadb

  web:
    image: testsmith/practice-software-testing-web
    ports:
      - 8091:80
      - 8000:81
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      - laravel-api

  angular-ui:
    image: testsmith/practice-software-testing-sprint5-ui
    ports:
      - 4200:4200
    command: bash -c "ng serve --host 0.0.0.0 --port 4200"

volumes:
  laravel-app-code:
